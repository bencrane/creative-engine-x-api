# ─────────────────────────────────────────────────────────────────────────────
# QUALITY BAR
# ─────────────────────────────────────────────────────────────────────────────
quality_bar:
  html_validity: "Rendered HTML must pass W3C structural validation (no unclosed tags, valid nesting)."
  mobile_responsive: "All layouts must render correctly at 320px and 768px viewport widths."
  brand_application: "Primary color used for CTAs; secondary for hero backgrounds and accents."
  form_integrity: "All required fields must have required attribute; action must point to /lp/{slug}/submit."
  utm_capture: "Hidden utm_* fields present in form; JS snippet correctly reads URLSearchParams."
  analytics_conditional: "RudderStack snippet injected only when rudderstack_enabled=true."
  above_fold: "Headline, sub-headline, and form (or primary CTA) must be visible without scrolling on 1080p."
  slug_uniqueness: "No two assets share the same slug; uuid4 derivation guarantees this."

acceptance_criteria:
  - "Rendered HTML is valid and parseable; no unclosed or malformed tags."
  - "Page is mobile responsive: two-column layouts collapse below 768px breakpoint."
  - "All form fields defined for the template_type are present in the rendered HTML."
  - "Form action attribute is exactly '/lp/{slug}/submit' using the generated slug."
  - "UTM capture JS is present in <head> or just before </body>."
  - "RudderStack JS snippet is present only when rudderstack_enabled=true."
  - "Brand primary_color applied to submit button and interactive elements."
  - "Slug is exactly 12 hexadecimal characters."
  - "HTML uploaded to Supabase Storage at assets/lp/{slug}.html; URL is resolvable."
  - "GET /lp/{slug} returns 200 with correct Content-Type: text/html."
  - "POST /lp/{slug}/submit inserts a row into landing_page_submissions."
  - "generated_assets row has asset_type=html_page, correct slug, template_used."
  - "Webinar pages include speaker section and event_date display; error if speakers omitted."
  - "Case study pages render metrics bar with ≥3 metric tiles and all three narrative sections."
  - "Claude model used is claude-opus-4-20250514 — verified in generation logs."
