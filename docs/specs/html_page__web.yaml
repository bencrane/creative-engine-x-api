spec_id: html_page__web
artifact_type: html_page
surface: web
version: "1.0"
description: >
  Landing page generator producing conversion-optimized HTML pages for four campaign
  objectives: lead magnet download, case study, webinar registration, and demo request.
  Content is generated by Claude Opus and rendered via Jinja2 templates with inline
  minified CSS. Pages are hosted at /lp/{slug} with integrated form submission handling,
  RudderStack analytics, and UTM parameter capture. HTML is stored in Supabase Storage;
  the slug is returned for routing through the hosting layer.

# ─────────────────────────────────────────────────────────────────────────────
# CONSTRAINTS
# ─────────────────────────────────────────────────────────────────────────────
constraints:
  hard:
    - Claude model is fixed at claude-opus-4-20250514.
    - Jinja2 >= 3.1 is the required template engine; no other templating is permitted.
    - Each template_type maps to exactly one Jinja2 template file — no cross-template mixing.
    - CSS must be inline and minified in the rendered HTML (no external stylesheets).
    - RudderStack JS SDK must be injected only when rudderstack_enabled=true in tenant config.
    - UTM parameters (utm_source, utm_medium, utm_campaign, utm_content, utm_term) must
      be captured from query string and stored on form submission.
    - Form submissions must POST to /lp/{slug}/submit.
    - All submitted form data must be inserted into landing_page_submissions table.
    - Slug format: 12-character hex string derived from uuid4.
    - HTML must be uploaded to Supabase Storage bucket "assets" and the slug returned.
    - Pages must be mobile responsive with breakpoint at max-width: 768px.

  soft:
    - Above-the-fold content should communicate the primary value prop without scrolling.
    - Form labels should use sentence case; submit button copy should be action-oriented.
    - Hero headlines should be ≤80 characters for readability.
    - Social proof elements (logos, testimonials) improve conversion — include when available.
    - "Page load performance: minimize render-blocking resources; no external font CDN calls unless fonts are already cached by the tenant's main site."

# ─────────────────────────────────────────────────────────────────────────────
# SUBTYPES (TEMPLATE TYPES)
# ─────────────────────────────────────────────────────────────────────────────
subtypes:
  lead_magnet_download:
    label: "Lead Magnet Download"
    description: >
      Offers a downloadable asset (PDF guide, checklist, report) in exchange for a
      form submission. Two-column layout: value proposition content on the left,
      gated form on the right. Optimized for email capture.
    template_file: "lead_magnet_download.html.j2"
    layout: "2-column: value props (left) + form (right)"
    sections:
      - Hero headline and sub-headline (left column)
      - Bullet list of what the reader will learn / get (left column)
      - Asset preview image or icon (left column, optional)
      - Social proof strip (left column, optional: customer logos)
      - Gated form (right column)
    form_fields:
      - name: first_name
        type: text
        label: "First name"
        required: true
      - name: last_name
        type: text
        label: "Last name"
        required: true
      - name: work_email
        type: email
        label: "Work email"
        required: true
      - name: company
        type: text
        label: "Company name"
        required: true
    submit_button_label: "Get Instant Access"
    post_submit: "Display thank-you message and/or redirect to asset URL"

  case_study:
    label: "Case Study"
    description: >
      Full-length case study page for a customer success story. Hero banner with
      client and outcome, metrics bar for at-a-glance results, and long-form narrative
      sections. No gated form by default; optional contact CTA at the bottom.
    template_file: "case_study.html.j2"
    layout: "Hero + metrics bar + narrative sections"
    sections:
      - Hero: client name, challenge summary, hero outcome stat
      - Metrics bar: 3–5 key result tiles (icon, number, label)
      - Narrative: The Challenge (prose)
      - Narrative: The Solution (prose)
      - Narrative: The Results (prose with callout stats)
      - Pull quote / testimonial block
      - "Bottom CTA: 'See a demo' or 'Read more case studies'"
    form_fields:
      - name: first_name
        type: text
        label: "First name"
        required: true
      - name: work_email
        type: email
        label: "Work email"
        required: true
    form_placement: "Optional bottom-of-page CTA form; can be disabled"
    submit_button_label: "Request a Demo"

  webinar:
    label: "Webinar Registration"
    description: >
      Event registration page for a live or on-demand webinar. Two-column layout
      with speaker bios, agenda, and event details on the left; sticky registration
      form on the right. Urgency and social proof are key conversion levers.
    template_file: "webinar.html.j2"
    layout: "2-column: speakers/agenda (left) + sticky registration form (right)"
    sections:
      - Event headline and date/time (left column)
      - What you'll learn — 3–5 bullet points (left column)
      - Speaker cards: photo, name, title, company (left column)
      - Agenda: time-labeled sessions (left column, optional)
      - Sticky registration form (right column, scrolls with page)
    form_fields:
      - name: first_name
        type: text
        label: "First name"
        required: true
      - name: last_name
        type: text
        label: "Last name"
        required: true
      - name: work_email
        type: email
        label: "Work email"
        required: true
      - name: job_title
        type: text
        label: "Job title"
        required: false
    submit_button_label: "Reserve My Spot"
    post_submit: "Confirmation message with calendar invite link (if provided)"
    special_rendering:
      - Event date/time must be prominently displayed with timezone
      - Countdown timer (JS) optional if event_date is in the future
      - Speaker photos: use placeholder avatar if image URL not supplied

  demo_request:
    label: "Demo Request"
    description: >
      High-intent conversion page for requesting a product demo. Three-column benefits
      grid above the fold, trust signals section, and a prominent form. Designed for
      bottom-of-funnel prospects.
    template_file: "demo_request.html.j2"
    layout: "3-column benefits grid + trust signals + form"
    sections:
      - Page headline and sub-headline (full width)
      - 3-column benefits grid: icon, title, 1-line description per benefit (3–6 items)
      - Trust signals row: customer logos, awards, certifications
      - Demo request form (full-width or centered, max-width 560px)
      - Social proof: testimonial quote block
    form_fields:
      - name: first_name
        type: text
        label: "First name"
        required: true
      - name: last_name
        type: text
        label: "Last name"
        required: true
      - name: work_email
        type: email
        label: "Work email"
        required: true
      - name: company
        type: text
        label: "Company"
        required: true
      - name: phone
        type: tel
        label: "Phone number"
        required: false
      - name: company_size
        type: select
        label: "Company size"
        options: ["1–10", "11–50", "51–200", "201–500", "501–1000", "1000+"]
        required: false
    submit_button_label: "Request My Demo"
    post_submit: "Redirect to calendar booking link or show confirmation message"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE
# ─────────────────────────────────────────────────────────────────────────────
pipeline:
  generator: ClaudeAIClient
  renderer: Jinja2 >= 3.1
  provider: Anthropic
  claude_model: claude-opus-4-20250514
  claude_temperature: 0.6
  structured_output_pattern: tool_use
  prompt_caching: true
  max_output_tokens: 128000

  generation_flow:
    - Build AssetContext via build_asset_context(org_id, campaign_id, supabase)
    - Select Jinja2 template file based on template_type
    - Call Claude with content_props + AssetContext to generate structured page content JSON
    - Inject generated content + brand variables into Jinja2 template
    - Minify inline CSS in Jinja2 output
    - Conditionally inject RudderStack JS SDK block based on tenant config
    - Inject UTM capture JS snippet
    - Generate 12-char hex slug from uuid4
    - Upload rendered HTML to Supabase Storage at assets/lp/{slug}.html
    - Insert record into generated_assets with slug, template_used, content_url
    - Return asset_id, slug, content_url

  claude_output_structure:
    type: object
    description: "Structured content consumed by the Jinja2 template"
    properties:
      headline: string
      sub_headline: string
      value_props: array  # list of bullet strings (lead_magnet, demo_request)
      benefits:  # demo_request only
        type: array
        items:
          properties:
            icon: string  # SVG inline or emoji
            title: string
            description: string
      speakers:  # webinar only
        type: array
        items:
          properties:
            name: string
            title: string
            company: string
            bio: string
            photo_url: string  # nullable
      agenda:  # webinar only
        type: array
        items:
          properties:
            time: string
            session: string
      metrics:  # case_study only
        type: array
        items:
          properties:
            value: string
            label: string
      narrative_sections:  # case_study only
        type: object
        properties:
          challenge: string
          solution: string
          results: string
      testimonial:
        type: object
        properties:
          quote: string
          author: string
          title: string
          company: string
      cta_text: string
      meta_title: string
      meta_description: string

# ─────────────────────────────────────────────────────────────────────────────
# RENDERER SPECIFICATION
# ─────────────────────────────────────────────────────────────────────────────
renderer:
  engine: Jinja2 >= 3.1
  template_directory: "templates/landing_pages/"
  template_files:
    - "lead_magnet_download.html.j2"
    - "case_study.html.j2"
    - "webinar.html.j2"
    - "demo_request.html.j2"

  jinja2_variables:
    brand:
      primary_color: "from brand_guidelines"
      secondary_color: "from brand_guidelines"
      company_name: "from AssetContext"
      logo_url: "from brand_guidelines (nullable)"
    content: "Claude-generated structured content object"
    form:
      action_url: "/lp/{slug}/submit"
      fields: "from subtype form_fields definition"
    analytics:
      rudderstack_enabled: boolean
      rudderstack_write_key: "from tenant config (nullable)"
    utm:
      capture_params: [utm_source, utm_medium, utm_campaign, utm_content, utm_term]

  css:
    delivery: inline_minified
    approach: >
      All CSS is written inline within a <style> tag in the rendered HTML.
      Jinja2 variables for brand colors are interpolated at render time.
      No external stylesheet requests.
    responsive:
      breakpoint: "768px"
      mobile_adjustments:
        - "Two-column layouts collapse to single column"
        - "Sticky form becomes static, stacked below content"
        - "Font sizes scale down by ~15%"
        - "Benefits grid collapses from 3-col to 1-col"

  analytics_injection:
    rudderstack:
      condition: "rudderstack_enabled == true in tenant config"
      js_block: >
        Standard RudderStack JS SDK snippet injected in <head>.
        Includes write_key from tenant config.
        Fires identify() on page load if user_id available.
        Fires track('Page Viewed') on page load.
        Fires track('Form Submitted') on POST /lp/{slug}/submit completion.
    utm_capture:
      always_injected: true
      mechanism: >
        JS reads URLSearchParams on DOMContentLoaded.
        Stores utm_* values in sessionStorage.
        Appends utm_* as hidden fields to all forms before submission.

# ─────────────────────────────────────────────────────────────────────────────
# HOSTING & FORM HANDLING
# ─────────────────────────────────────────────────────────────────────────────
hosting:
  slug_format: "12-character hex string from uuid4"
  slug_example: "a3f8c901b2e4"

  routes:
    serve:
      method: GET
      path: "/lp/{slug}"
      behavior: >
        Fetch HTML from Supabase Storage at assets/lp/{slug}.html.
        Return 200 with Content-Type: text/html.
        Return 404 if slug not found.

    submit:
      method: POST
      path: "/lp/{slug}/submit"
      behavior: >
        Parse multipart/form-data or application/x-www-form-urlencoded body.
        Extract UTM params from form hidden fields.
        Insert row into landing_page_submissions:
          { asset_id, slug, form_data (JSON), utm_params (JSON),
            organization_id, campaign_id, submitted_at }
        Call RudderStack server-side identify() and track('Form Submitted') if enabled.
        Return 302 redirect to thank-you URL or 200 JSON if AJAX submission.

# ─────────────────────────────────────────────────────────────────────────────
# BRAND CONTEXT INTEGRATION
# ─────────────────────────────────────────────────────────────────────────────
brand_context:
  source: build_asset_context(org_id, campaign_id, supabase)
  model: AssetContext
  fields_used:
    - company_name → page header, footer, form attribution
    - brand_guidelines.primary_color → CTAs, links, section accents
    - brand_guidelines.secondary_color → hero backgrounds, section dividers
    - brand_guidelines.logo_url → header logo (if present)
    - brand_voice → Claude prompt tone instruction
    - value_proposition → hero sub-headline and benefit framing
    - icp_definition → audience-aware headline and copy generation
    - case_studies → populates case_study narrative sections
    - testimonials → populates testimonial block
    - customer_logos → trust signals / logo strip
    - competitors → optionally informs differentiation copy

# ─────────────────────────────────────────────────────────────────────────────
# DELIVERY
# ─────────────────────────────────────────────────────────────────────────────
delivery:
  mode: sync
  output_format: html_text
  storage: supabase
  bucket: assets
  path_pattern: "lp/{slug}.html"
  auth: service_role_key via httpx REST upload
  public_url: true
  slug_returned: true

# ─────────────────────────────────────────────────────────────────────────────
# CONTENT PROPS SCHEMA
# ─────────────────────────────────────────────────────────────────────────────
content_props_schema:
  type: object
  properties:
    template_type:
      type: string
      enum: [lead_magnet_download, case_study, webinar, demo_request]
      description: "Selects the Jinja2 template and determines layout, sections, and form fields."
    topic:
      type: string
      description: >
        The subject or offer of the landing page. E.g. 'Free Pipeline Health Assessment'
        or 'How Acme Corp Cut Churn 40% with our Platform'.
    objective:
      type: string
      description: >
        Primary conversion goal in plain language. E.g. 'Capture email for PDF download',
        'Drive webinar signups', 'Book a product demo'.
    speakers:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          title:
            type: string
          company:
            type: string
          bio:
            type: string
            description: "2–3 sentence professional bio."
          photo_url:
            type: string
            format: uri
            nullable: true
        required: [name, title, company]
      description: "Speaker details — required for webinar template_type."
      nullable: true
    event_date:
      type: string
      format: date-time
      description: >
        Event date and time in ISO 8601 format with timezone offset.
        Required for webinar template_type.
      nullable: true
  required: [template_type, topic, objective]

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUT SCHEMA
# ─────────────────────────────────────────────────────────────────────────────
output_schema:
  type: object
  properties:
    asset_id:
      type: string
      format: uuid
    slug:
      type: string
      pattern: "^[0-9a-f]{12}$"
      description: "12-char hex slug for routing at /lp/{slug}."
    content_url:
      type: string
      format: uri
      description: "Supabase Storage URL for the HTML file."
    serve_url:
      type: string
      format: uri
      description: "Live URL: https://{domain}/lp/{slug}"
    organization_id:
      type: string
      format: uuid
    campaign_id:
      type: string
      format: uuid
      nullable: true
    asset_type:
      type: string
      const: html_page
    template_used:
      type: string
      description: "template_type used for rendering."
    created_at:
      type: string
      format: date-time
    status:
      type: string
      enum: [complete, failed]

