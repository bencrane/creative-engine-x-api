    - { index: 5, text: "Trusted by 500+ RevOps Teams", char_count: 28, category: "social_proof", truncated: false }
    - { index: 6, text: "CRM Forecasting Made Simple", char_count: 27, category: "keyword_match", truncated: false }
    - { index: 7, text: "Close Q4 With Confidence", char_count: 24, category: "urgency", truncated: false }
    - { index: 8, text: "Revenue Forecast in Minutes", char_count: 27, category: "benefit", truncated: false }
    - { index: 9, text: "Acme Analytics — Try Free", char_count: 25, category: "brand", truncated: false }
    - { index: 10, text: "B2B Revenue Forecast Tool", char_count: 25, category: "keyword_match", truncated: false }

  descriptions:
    - { index: 1, text: "Connect your CRM and get a revenue forecast accurate within 5%. No code or data team needed.", char_count: 91, focus: "differentiator", truncated: true }
    - { index: 2, text: "Join 500+ B2B sales teams using Acme to forecast revenue and hit targets. Start free today.", char_count: 91, focus: "proof_point", truncated: false }
    - { index: 3, text: "Start your free trial in under 10 minutes. Accurate forecasts. Cancel anytime.", char_count: 78, focus: "cta", truncated: false }
    - { index: 4, text: "Stop defending inaccurate forecasts. Acme Analytics gives you 95% accuracy — guaranteed.", char_count: 89, focus: "objection_handling", truncated: false }

  paths:
