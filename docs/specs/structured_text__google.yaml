      rationale: "Strongest keyword match for primary search intent. Anchors the ad topic immediately."
    position_2:
      headline_index: 2
      headline_text: "Predict Revenue Within 5%"
      rationale: "Delivers the core value proposition in position 2, where users look after reading the topic headline."
    position_3:
      headline_index: 4
      headline_text: "Start Your Free Trial Today"
      rationale: "CTA in position 3 creates a logical flow: Topic → Benefit → Action. Useful if CTR data shows free-trial searchers dominate."
    warning: "Pinning more than 1–2 headlines significantly reduces Google's ability to optimise RSA performance. Pin only if brand/legal compliance requires a specific message in a specific slot."

  truncated_fields:
