  generation_metadata:
    model: "claude-sonnet-4-20250514"
    surface: "google_rsa"
    headlines_generated: 10
    descriptions_generated: 4
    generated_at: "2026-03-26T16:02:00Z"

# ─── Quality Bar ────────────────────────────────────────────
quality_bar: >
  Headlines must span at least 5 distinct categories (keyword_match, benefit,
  feature, cta, social_proof/urgency/brand) — no single category may account
  for more than 3 of the 10 headlines. No two headlines may share the same
  opening word. Descriptions must be complete sentences ending in punctuation.
  All four descriptions must be substantively different — no phrase-level
  repetition across descriptions. Path suggestions must be clean URL-safe slugs
  derived from the landing_page_url theme and target keywords.

# ─── Acceptance Criteria ────────────────────────────────────
acceptance_criteria:
  - Exactly 10 headlines and 4 descriptions returned.
  - Every headline ≤30 chars after validate_ad_copy_limits.
  - Every description ≤90 chars after validate_ad_copy_limits.
  - path1 and path2 in both path options ≤15 chars after slugification.
  - truncated_fields accurately identifies all truncated items using format "headlines[{n}]" / "descriptions[{n}]".
  - pinning_suggestions provides position_1, position_2, and position_3 each referencing a valid headline_index (1–10).
  - headline categories span at least 5 distinct enum values.
  - At least one headline and one description include the cta_text intent.
  - At least 3 headlines naturally incorporate keywords from content_props.keywords.
  - Output parses as valid JSON conforming to output_schema.
  - generation_metadata.surface is always "google_rsa".
