# ============================================================
# creative-engine-x — Spec: Meta (Facebook / Instagram) Ad Copy
# Generated: 2026-03-26 | Version: 1.0
# Source audit: Section 2.3 (Ad Copy character limits)
# ============================================================

spec_id: structured_text__meta
artifact_type: structured_text
surface: meta
version: "1.0"
description: >
  Generates Meta (Facebook and Instagram) ad copy in sets of 3 variants per request.
  Unlike LinkedIn, Meta does not enforce API-level hard character limits, but
  enforces display truncation that significantly degrades ad performance beyond
  the soft-limit thresholds. Each variant contains primary_text (the body copy
  shown above the creative), headline (bold text in the link preview card), and
  description (smaller text below the headline in feed placements).
  When placement is "both", variants are annotated with placement-specific
  presentation notes. All fields generated in a single Claude Sonnet call
  using the tool_use structured-output pattern.

# ─── Constraints ────────────────────────────────────────────
constraints:
  hard:
    # Meta does not impose API hard limits; truncation occurs in the ad display
    primary_text:
      max_chars: null
      enforcement: none
    headline:
      max_chars: null
      enforcement: none
    description:
      max_chars: null
      enforcement: none

  soft:
    primary_text:
      recommended_chars: 125
      rationale: >
        Meta truncates primary_text after ~125 chars in News Feed with a
        "See more" prompt. Audiences rarely expand. Deliver the core
        message and hook within 125 chars.
    headline:
      recommended_chars: 40
      rationale: >
        Headlines are truncated to ~40 chars in most feed placements.
        For Stories, even fewer characters are visible. Keep punchy.
    description:
      recommended_chars: 30
      rationale: >
        Description is shown only in link-preview cards (Feed) and is
        hidden entirely in Stories and Reels. Max visible is ~30 chars;
        treat as supplementary metadata.

  validation_pattern: validate_ad_copy_limits
  validation_notes: >
    Meta fields are soft-limit only. validate_ad_copy_limits runs in
    advisory mode: overruns are recorded in soft_limit_warnings but NO
    truncation is applied. This preserves the author's intent for
    formats like Stories where longer primary_text can scroll.
    Callers may choose to truncate client-side using the warnings.

# ─── Pipeline ───────────────────────────────────────────────
pipeline:
  generator: generators.ad_copy.AdCopyGenerator
  renderer: null
  provider: null
  claude_model: claude-sonnet-4-20250514
  claude_temperature: 0.7
  claude_max_tokens: 1024
  generation_strategy: >
    Single Claude call via tool_use pattern. System prompt carries brand context
    (AssetContext). When placement is "both", the prompt instructs the model to
    annotate which copy elements work best for feed vs. stories and to keep
    primary_text under 125 chars (since stories truncate even more aggressively
    than feed). Variants 1–3 generated in one response.

# ─── Delivery ───────────────────────────────────────────────
delivery:
  mode: sync
  output_format: application/json
  storage: null    # inline JSON stored in generated_assets.content_json column
  asset_type_enum: ad_copy
  surface_tag: meta

# ─── Content Props Schema ───────────────────────────────────
content_props_schema:
  type: object
  properties:
    topic:
      type: string
      description: >
        The subject matter or campaign theme for the ad.
        Examples: "retargeting campaign — free trial offer",
        "brand awareness — product launch", "event promotion".
      maxLength: 300

    value_proposition:
      type: string
      description: >
        The core benefit or differentiator to communicate.
        Examples: "Get 30 days free, no credit card required",
        "Join 10,000 marketers automating their reporting".
      maxLength: 500

    target_audience:
      type: string
      description: >
        The persona or segment this ad should resonate with.
        Examples: "Small business owners aged 28–45 interested in marketing tools",
        "eCommerce store owners using Shopify".
      maxLength: 300

    cta_text:
      type: string
      description: >
        The desired CTA phrase. Will be echoed in copy and informs
        the tone of urgency.
        Examples: "Shop now", "Learn more", "Sign up free", "Get the offer".
      maxLength: 100

    placement:
      type: string
      description: >
        Target placement(s). Determines tone and length guidance the model
        uses. "feed" = Facebook/Instagram Feed (link card format). "stories"
        = Instagram/Facebook Stories (full-screen vertical, overlay text).
        "both" = generate copy suitable for both and annotate accordingly.
      enum:
        - feed
        - stories
        - both
      default: feed

    tone:
      type: string
      description: >
        Optional tone modifier. Overrides brand_voice default.
      enum:
        - professional
        - conversational
        - urgent
        - inspirational
        - authoritative
        - playful
      nullable: true

  required:
    - topic
    - value_proposition
    - target_audience
    - cta_text

# ─── Output Schema ──────────────────────────────────────────
output_schema:
  type: object
  properties:
    variants:
      type: array
      minItems: 3
      maxItems: 3
      items:
        type: object
        properties:
          variant_index:
            type: integer
            description: 1-based index (1, 2, 3).
          primary_text:
            type: string
            description: Main body copy shown above the creative. Soft limit 125 chars.
          headline:
            type: string
            description: Bold link headline. Soft limit 40 chars.
          description:
            type: string
            description: Sub-headline in link card. Soft limit 30 chars. Hidden in Stories.
          placement_notes:
            type: object
            description: >
              Populated when content_props.placement is "both". Contains
              annotations on how the copy adapts to each placement context.
            properties:
              feed:
                type: string
                description: Notes on feed suitability for this variant.
              stories:
                type: string
                description: >
                  Notes on stories suitability. May suggest condensing
                  primary_text or leaning on the headline only.
            nullable: true
          char_counts:
            type: object
            properties:
              primary_text: { type: integer }
              headline: { type: integer }
              description: { type: integer }
          soft_limit_warnings:
            type: array
            description: Fields that exceed their recommended soft limit (no truncation applied).
            items: { type: string }
        required:
          - variant_index
          - primary_text
          - headline
          - description
          - char_counts
          - soft_limit_warnings

    generation_metadata:
      type: object
      properties:
        model: { type: string }
        surface: { type: string, const: meta }
        placement: { type: string }
        variant_count: { type: integer, const: 3 }
        generated_at: { type: string, format: date-time }

  required:
    - variants
    - generation_metadata

# ─── Example Request ────────────────────────────────────────
example_request:
  content_props:
    topic: "Free trial offer — project management SaaS"
    value_proposition: "Replace your spreadsheets with a real project tracker. Free for 30 days, no credit card needed."
    target_audience: "Freelancers and small agency owners managing client projects"
    cta_text: "Start free trial"
    placement: "both"
    tone: "conversational"
  brand_context:
    company_name: "Flowdesk"
    brand_voice: "Approachable, energetic, and empowering. Speaks to busy people who hate busywork."

# ─── Example Response ───────────────────────────────────────
example_response:
  variants:
    - variant_index: 1
      primary_text: "Tired of managing projects in spreadsheets? Flowdesk gives you a real tracker — free for 30 days."
      headline: "Ditch the spreadsheet chaos"
      description: "Free 30-day trial. No card needed."
      placement_notes:
        feed: "Strong hook in primary_text; headline reinforces pain point. Description visible in link card — use it."
        stories: "Primary_text overlays well at 96 chars. Headline alone ('Ditch the spreadsheet chaos') can anchor a text-overlay layout."
      char_counts:
        primary_text: 97
        headline: 27
        description: 32
      soft_limit_warnings:
        - description

    - variant_index: 2
      primary_text: "What if managing client projects took 10 minutes a day? Start your free Flowdesk trial and find out."
      headline: "Your projects, finally under control"
      description: "30 days free — start today."
      placement_notes:
        feed: "Question-led hook performs well in feed scroll. Headline is 37 chars — within soft limit."
        stories: "Consider using only the headline as the overlay CTA for stories; primary_text supports but isn't essential."
      char_counts:
        primary_text: 101
        headline: 36
        description: 26
      soft_limit_warnings: []

    - variant_index: 3
      primary_text: "10,000+ freelancers switched from spreadsheets to Flowdesk. Try it free for 30 days."
      headline: "Join 10,000 freelancers — try free"
      description: "No credit card. Cancel anytime."
      placement_notes:
        feed: "Social proof angle. All three fields are within soft limits — strong feed candidate."
        stories: "Social proof number ('10,000+') is a compelling stories overlay. Pair with CTA button."
      char_counts:
        primary_text: 86
        headline: 34
        description: 30
      soft_limit_warnings: []

  generation_metadata:
    model: "claude-sonnet-4-20250514"
    surface: "meta"
    placement: "both"
    variant_count: 3
    generated_at: "2026-03-26T16:02:00Z"

# ─── Quality Bar ────────────────────────────────────────────
quality_bar: >
  The three variants must represent distinct creative angles: one problem/pain-led,
  one benefit/outcome-led, and one social-proof or authority-led. All primary_text
  values should aim to land within the 125-char soft limit; any overrun must be
  intentional and noted. When placement is "both" or "stories", the headline must
  stand alone as a compelling 1-line hook because it is the primary visible element
  in Stories overlays. Description should always reinforce or complete the CTA, not
  repeat the headline.

# ─── Acceptance Criteria ────────────────────────────────────
acceptance_criteria:
  - Exactly 3 variants returned per request.
  - All three fields (primary_text, headline, description) present and non-empty in every variant.
  - soft_limit_warnings accurately identifies any field where char count > recommended limit.
  - No truncation is applied to Meta fields (soft-only enforcement).
  - placement_notes is populated for all 3 variants when content_props.placement == "both" or "stories".
  - placement_notes is null or omitted when content_props.placement == "feed".
  - Each variant's angle is meaningfully distinct (pain vs. benefit vs. proof).
  - CTA intent from cta_text is present in each variant.
  - Output parses as valid JSON conforming to output_schema.
  - generation_metadata.surface is always "meta" and placement matches content_props.placement.
