spec_id: document_slides__linkedin
artifact_type: document_slides
surface: linkedin
version: "1.0"
description: >
  LinkedIn carousel (Document Ad) generator producing multi-slide PDF decks optimized
  for LinkedIn's document ad format. Supports three narrative patterns across 5–8 slides.
  Rendered by ReportLab with dark, brand-aware slide layouts. Content generated by
  Claude Opus at low temperature for punchy, constrained copy. Two aspect ratios
  supported: 1:1 (square) and 4:5 (portrait). Output is a PDF binary stored in
  Supabase Storage and returned as a public URL. The final slide is always a CTA slide.

# ─────────────────────────────────────────────────────────────────────────────
# CONSTRAINTS
# ─────────────────────────────────────────────────────────────────────────────
constraints:
  hard:
    - Headline text per slide must NOT exceed 50 characters (enforced pre-render).
    - Body text per slide must NOT exceed 120 characters (enforced pre-render).
    - Slide count must be between 5 and 8 (inclusive).
    - The final slide MUST be a CTA slide regardless of pattern.
    - Claude model is fixed at claude-opus-4-20250514.
    - Temperature is fixed at 0.4 for all carousel generation.
    - Aspect ratio must be either 1:1 (1080×1080 display, 540×540 pts) or 4:5 (1080×1350 display, 540×675 pts).
    - PDF must be stored in Supabase Storage bucket "assets" and a public URL returned.
    - All slide backgrounds must use brand.secondary_color (dark).

  soft:
    - Prefer 6–7 slides for most patterns; 8 slides for data_story with rich stats.
    - Stat callouts should use whole numbers or clean percentages (e.g. "3×", "47%").
    - Every non-CTA slide should have a distinct micro-insight to maintain scroll momentum.
    - Company name should be recognizable at a glance in the bottom-right corner.
    - Slide counter (e.g. "1/7") helps viewers track progress — include on all non-CTA slides.

# ─────────────────────────────────────────────────────────────────────────────
# SUBTYPES (PATTERNS)
# ─────────────────────────────────────────────────────────────────────────────
subtypes:
  problem_solution:
    label: "Problem → Solution"
    description: >
      Classic narrative arc that establishes audience pain, validates it with data or
      empathy, then presents the product or approach as the solution, backed by proof.
    slide_count_range: [5, 7]
    slide_structure:
      - role: hook
        purpose: "Grab attention with a bold claim or provocative question about the problem space."
        headline_guidance: "Pose the pain as a question or bold statement. Max 50 chars."
        body_guidance: "1–2 lines amplifying the pain. Max 120 chars."
      - role: problem
        purpose: "Define the problem concretely; make the audience feel it."
        headline_guidance: "Name the problem directly."
        body_guidance: "Quantify or qualify the cost of inaction."
      - role: problem_depth
        purpose: "Add a supporting pain point or show why current approaches fail."
        headline_guidance: "Surface a root cause or secondary failure."
        body_guidance: "Brief supporting evidence."
        optional: true
      - role: solution
        purpose: "Introduce the solution concept or product approach."
        headline_guidance: "Frame the solution as a pivot from the problem."
        body_guidance: "1 sentence on how it works or what changes."
      - role: proof
        purpose: "Provide a result, testimonial fragment, or stat that validates the solution."
        headline_guidance: "Lead with the outcome metric."
        body_guidance: "Attribution or context (e.g. 'median result across 200 customers')."
      - role: cta
        purpose: "Drive the desired action."
        is_cta: true

  listicle:
    label: "Listicle"
    description: >
      Numbered list format where each interior slide covers one item. High scannability.
      Best for "N ways to…", "N mistakes to avoid", or "N tools for…" framing.
    slide_count_range: [5, 8]
    slide_structure:
      - role: title
        purpose: "Announce the list topic and promise value (e.g. '7 Ways to Cut CAC by 30%')."
        headline_guidance: "State the list topic and count. Max 50 chars."
        body_guidance: "Optional teaser. Max 120 chars."
      - role: item
        purpose: "One list item per slide. Repeat N times (N = slide_count − 3)."
        repeats: true
        headline_guidance: "Item title or action phrase. Max 50 chars."
        body_guidance: "Brief explanation or example. Max 120 chars."
        item_number_display: true  # Show "3/7" style numbering
      - role: summary
        purpose: "Recap the list; reinforce the core theme."
        headline_guidance: "Synthesis statement. Max 50 chars."
        body_guidance: "One sentence takeaway."
      - role: cta
        purpose: "Drive the desired action."
        is_cta: true

  data_story:
    label: "Data Story"
    description: >
      Leads with a striking statistic, supports it with additional data points,
      and draws clear implications before the CTA. Best for research-backed content
      and thought leadership.
    slide_count_range: [5, 8]
    slide_structure:
      - role: big_stat
        purpose: "Open with the single most compelling number. Large stat callout treatment."
        headline_guidance: "The stat itself, prominently displayed. Max 50 chars."
        body_guidance: "One line of context. Max 120 chars."
        stat_callout: true  # Triggers 72pt stat display treatment
      - role: supporting_data
        purpose: "3–5 additional statistics that reinforce the opening claim."
        repeats: true
        headline_guidance: "Stat + brief label. Max 50 chars."
        body_guidance: "Implication or source reference. Max 120 chars."
        stat_callout: true
      - role: implications
        purpose: "Translate data into action implications for the target audience."
        headline_guidance: "What this means for the reader. Max 50 chars."
        body_guidance: "Recommended response or insight. Max 120 chars."
      - role: cta
        purpose: "Drive the desired action."
        is_cta: true

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE
# ─────────────────────────────────────────────────────────────────────────────
pipeline:
  generator: ClaudeAIClient
  renderer: ReportLab >= 4.1 (programmatic, no template files)
  provider: Anthropic
  claude_model: claude-opus-4-20250514
  claude_temperature: 0.4
  structured_output_pattern: tool_use
  prompt_caching: true
  max_output_tokens: 128000

  generation_flow:
    - Build AssetContext via build_asset_context(org_id, campaign_id, supabase)
    - Assemble system prompt with brand voice, headline/body char constraints, pattern rules
    - Call Claude with content_props to generate structured slide JSON (array of slide objects)
    - Validate each slide: headline ≤50 chars, body ≤120 chars; truncate or retry if violated
    - Validate slide count is 5–8 and last slide has role=cta
    - Pass validated slide array to ReportLab renderer
    - Upload PDF binary to Supabase Storage
    - Insert record into generated_assets table
    - Return asset_id, content_url, slug

  claude_output_structure:
    type: array
    items:
      type: object
      properties:
        slide_number: integer
        role: string  # hook | problem | solution | proof | item | big_stat | supporting_data | implications | summary | title | cta
        headline: string  # ≤50 chars
        body: string  # ≤120 chars
        stat_value: string  # optional, only for stat_callout slides
        stat_label: string  # optional, descriptor for stat
        is_cta: boolean

# ─────────────────────────────────────────────────────────────────────────────
# RENDERER SPECIFICATION
# ─────────────────────────────────────────────────────────────────────────────
renderer:
  engine: ReportLab

  aspect_ratios:
    "1:1":
      display_resolution: "1080 × 1080 px"
      canvas_size_points: "540 × 540 pt"
      use_case: "Standard LinkedIn document ad, square format"
    "4:5":
      display_resolution: "1080 × 1350 px"
      canvas_size_points: "540 × 675 pt"
      use_case: "Portrait format, takes more feed space"

  standard_slide_layout:
    background:
      color: brand.secondary_color  # dark background
    accent_bar:
      color: brand.primary_color
      height: 6pt
      position: top edge, full width
    headline:
      font: Helvetica-Bold
      size: 32pt
      color: "#FFFFFF"
      position: upper-center, below accent bar
      max_chars: 50
    body:
      font: Helvetica
      size: 16pt
      color: "#DDDDDD"
      position: center, below headline
      max_chars: 120
      line_wrap: true
    company_name:
      font: Helvetica
      size: 11pt
      color: brand.primary_color
      position: bottom-right corner, 12pt inset
    slide_counter:
      font: Helvetica
      size: 11pt
      color: "#888888"
      format: "{current}/{total}"
      position: bottom-left corner, 12pt inset
      exclude_from: [cta]

  stat_callout_overlay:
    triggered_by: "slides where stat_callout=true"
    stat_value:
      font: Helvetica-Bold
      size: 72pt
      color: brand.primary_color
      position: centered, upper half
    stat_label:
      font: Helvetica
      size: 14pt
      color: "#CCCCCC"
      position: below stat_value, centered
    headline:
      font: Helvetica-Bold
      size: 20pt  # reduced to accommodate stat
      color: "#FFFFFF"
    body:
      font: Helvetica
      size: 14pt
      color: "#DDDDDD"

  cta_slide_layout:
    background:
      color: brand.secondary_color
    accent_circle:
      style: translucent
      color: brand.primary_color
      opacity: 0.15
      diameter: 80% of canvas width
      position: centered
    headline:
      font: Helvetica-Bold
      size: 36pt
      color: "#FFFFFF"
      position: centered on canvas
      alignment: center
    cta_text:
      font: Helvetica
      size: 20pt
      color: brand.primary_color
      position: below headline, centered
    company_name:
      font: Helvetica-Bold
      size: 13pt
      color: "#FFFFFF"
      position: bottom-center

  typography_summary:
    standard_headline: "Helvetica-Bold, 32pt, white"
    standard_body: "Helvetica, 16pt, #DDD"
    stat_callout: "Helvetica-Bold, 72pt, primary_color"
    cta_headline: "Helvetica-Bold, 36pt, white"
    cta_body: "Helvetica, 20pt, primary_color"
    company_name: "Helvetica, 11pt, primary_color"
    slide_counter: "Helvetica, 11pt, #888"

# ─────────────────────────────────────────────────────────────────────────────
# BRAND CONTEXT INTEGRATION
# ─────────────────────────────────────────────────────────────────────────────
brand_context:
  source: build_asset_context(org_id, campaign_id, supabase)
  model: AssetContext
  fields_used:
    - company_name → bottom-right and CTA slide branding
    - brand_guidelines.primary_color → accent bar, stat callout text, CTA text, slide counter
    - brand_guidelines.secondary_color → all slide backgrounds
    - brand_voice → Claude prompt style instruction (punchy, data-led, etc.)
    - value_proposition → hooks CTA copy framing
    - icp_definition → audience-aware copy generation
    - target_persona → refines example specificity
    - testimonials → optionally feeds proof slide content
    - angle → frames the narrative hook for the selected pattern

# ─────────────────────────────────────────────────────────────────────────────
# DELIVERY
# ─────────────────────────────────────────────────────────────────────────────
delivery:
  mode: sync
  output_format: pdf_binary
  storage: supabase
  bucket: assets
  path_pattern: "document_slides/{organization_id}/{asset_id}.pdf"
  auth: service_role_key via httpx REST upload
  public_url: true

# ─────────────────────────────────────────────────────────────────────────────
# CONTENT PROPS SCHEMA
# ─────────────────────────────────────────────────────────────────────────────
content_props_schema:
  type: object
  properties:
    pattern:
      type: string
      enum: [problem_solution, listicle, data_story]
      description: "Narrative pattern / subtype for the carousel."
    topic:
      type: string
      description: >
        The subject matter of the carousel. E.g. 'The hidden cost of manual RevOps'
        or '5 ways AI is changing enterprise sales'.
    key_message:
      type: string
      description: >
        The single core takeaway the viewer should remember. Drives the CTA slide framing.
    stats:
      type: array
      items:
        type: object
        properties:
          value:
            type: string
            description: "Numeric value or percentage. E.g. '47%' or '3×'."
          label:
            type: string
            description: "What the stat measures. E.g. 'reduction in sales cycle'."
          source:
            type: string
            description: "Optional attribution. E.g. 'Gartner 2025'."
        required: [value, label]
      description: >
        Optional pre-supplied statistics for data_story or proof slides.
        If omitted, Claude generates plausible illustrative stats.
      nullable: true
    aspect_ratio:
      type: string
      enum: ["1:1", "4:5"]
      default: "1:1"
      description: "Canvas aspect ratio for the carousel slides."
  required: [pattern, topic, key_message]

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUT SCHEMA
# ─────────────────────────────────────────────────────────────────────────────
output_schema:
  type: object
  properties:
    asset_id:
      type: string
      format: uuid
    content_url:
      type: string
      format: uri
      description: "Public Supabase Storage URL for the carousel PDF binary."
    organization_id:
      type: string
      format: uuid
    campaign_id:
      type: string
      format: uuid
      nullable: true
    asset_type:
      type: string
      const: document_slides
    template_used:
      type: string
      description: "Pattern used (problem_solution | listicle | data_story)."
    slide_count:
      type: integer
      minimum: 5
      maximum: 8
    aspect_ratio:
      type: string
      enum: ["1:1", "4:5"]
    created_at:
      type: string
      format: date-time
    status:
      type: string
      enum: [complete, failed]

# ─────────────────────────────────────────────────────────────────────────────
# EXAMPLE REQUEST / RESPONSE
# ─────────────────────────────────────────────────────────────────────────────
example_request:
  organization_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
  campaign_id: "c9d8e7f6-a5b4-3210-fedc-ba0987654321"
  artifact_type: document_slides
  surface: linkedin
  content_props:
    pattern: data_story
    topic: "The ROI of sales automation for mid-market SaaS"
    key_message: "Teams using automation close 34% more deals without adding headcount."
    stats:
      - value: "34%"
        label: "more deals closed"
        source: "internal cohort analysis, 2025"
      - value: "6.2 hrs"
        label: "saved per rep per week"
      - value: "3×"
        label: "pipeline coverage improvement"
