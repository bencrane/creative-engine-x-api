  organization_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
  campaign_id: "c9d8e7f6-a5b4-3210-fedc-ba0987654321"
  asset_type: document_slides
  template_used: data_story
  slide_count: 7
  aspect_ratio: "1:1"
  created_at: "2026-03-26T16:02:00Z"
  status: complete

# ─────────────────────────────────────────────────────────────────────────────
# QUALITY BAR
# ─────────────────────────────────────────────────────────────────────────────
quality_bar:
  copy_constraints: "Zero tolerance — all headlines ≤50 chars, all body ≤120 chars before render."
  slide_count: "Must be 5–8 slides; final slide must be CTA."
  stat_callout: "Stat value must render at 72pt and be visually dominant on the slide."
  brand_application: "Background uses secondary_color; accent bar and stat text use primary_color."
  narrative_flow: "Slides must form a coherent progression matching the declared pattern."
  cta_clarity: "CTA slide headline and CTA text must unambiguously state the desired action."
  pdf_integrity: "File valid, all fonts embedded, slides render at correct canvas dimensions."

acceptance_criteria:
  - "All slide headlines are ≤50 characters (hard block, verified pre-render)."
  - "All slide body text is ≤120 characters (hard block, verified pre-render)."
  - "Slide count is between 5 and 8 (inclusive)."
  - "Final slide in the PDF has CTA layout (translucent accent circle, 36pt centered headline)."
  - "Stat callout slides render the stat_value at 72pt in primary_color."
  - "Canvas dimensions match declared aspect_ratio (540×540 or 540×675 points)."
  - "All slide backgrounds use brand.secondary_color."
  - "Accent bar appears at the top of every standard slide in brand.primary_color."
  - "Company name appears bottom-right on every slide."
  - "Slide counter appears bottom-left on all non-CTA slides."
  - "Claude model used is claude-opus-4-20250514 — verified in generation logs."
  - "PDF stored in Supabase Storage at expected path; public URL resolvable."
  - "generated_assets row inserted with correct organization_id, campaign_id, asset_type=document_slides."
