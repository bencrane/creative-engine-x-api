spec_id: physical_mail__direct_mail
artifact_type: physical_mail
surface: direct_mail
version: "1.0"
description: >
  Physical direct mail generator producing print-ready PDF artwork for postcards and
  letters. Supports three format subtypes with bleed zones and safe area margins
  compliant with standard print vendor specifications. Copy is generated by Claude
  Sonnet (short-form, structured). Artwork is rendered by ReportLab at 300 DPI.
  Output is a PDF binary stored in Supabase Storage. This generator produces the
  print-ready file ONLY — it does NOT call the Lob API or any print/mail fulfillment
  service. Fulfillment is handled by a separate downstream step.

# ─────────────────────────────────────────────────────────────────────────────
# CONSTRAINTS
# ─────────────────────────────────────────────────────────────────────────────
constraints:
  hard:
    - Do NOT call the Lob API or any print/mail fulfillment service at any point.
    - This generator produces a print-ready PDF only; fulfillment is out of scope.
    - Claude model is fixed at claude-sonnet-4-20250514 (short-form copy generation).
    - Temperature is fixed at 0.4 for all direct mail copy.
    - All PDF output must be at 300 DPI equivalent point density.
    - Bleed zones must be included for postcard subtypes; content must not enter bleed.
    - Safe area constraints must be enforced: all text and logos within safe area bounds.
    - PDF must be stored in Supabase Storage bucket "assets" and a public URL returned.
    - Headline copy must be supplied in content_props or generated by Claude if omitted.
    - Return address is required for postcard_4x6 and postcard_6x9 subtypes.

  soft:
    - Prefer high-contrast color treatment on front hero area for maximum visual impact.
    - CTA text should be imperative and specific (e.g., "Scan to claim your free audit").
    - Include a QR code placeholder region on postcard fronts for campaign tracking URLs.
    - Body copy should be ≤100 words for postcards; letters may run 250–400 words.
    - For letter format, use a formal salutation and professional closing.

# ─────────────────────────────────────────────────────────────────────────────
# SUBTYPES
# ─────────────────────────────────────────────────────────────────────────────
subtypes:
  postcard_4x6:
    label: "Postcard 4×6"
    description: >
      Standard USPS-compatible postcard. Most cost-effective format. High visual
      impact, short message window. Two sides: front (visual + headline + CTA),
      back (return address, mailing area, message body).
    dimensions:
      total_with_bleed:
        width_inches: 4.25
        height_inches: 6.25
        width_points: 306.0
        height_points: 450.0
      safe_area:
        width_inches: 4.0
        height_inches: 6.0
        width_points: 288.0
        height_points: 432.0
      bleed_per_side_inches: 0.125
      bleed_per_side_points: 9.0
    dpi: 300
    sides: [front, back]
    front_layout:
      hero_visual_area:
        position: "top 60% of front canvas"
        treatment: "brand primary_color solid fill or brand-supplied image area"
        note: "If no image is supplied, use brand primary_color gradient background"
      headline:
        position: "hero area, vertically centered"
        font: Helvetica-Bold
        size: 28pt
        color: "#FFFFFF"
        max_chars: 60
      cta:
        position: "lower portion of hero area or bottom of front"
        font: Helvetica-Bold
        size: 16pt
        color: brand.secondary_color or "#FFFFFF" (contrast-safe)
        max_chars: 40
      qr_placeholder:
        position: "bottom-right of front"
        size: "0.75in × 0.75in (54 × 54 pts)"
        content: "Empty white box with border; label 'Scan Me' in 9pt"
      company_name:
        position: "bottom-left of front"
        font: Helvetica
        size: 10pt
        color: "#FFFFFF"
    back_layout:
      return_address:
        position: "top-left quadrant"
        content: "content_props.return_address"
        font: Helvetica
        size: 9pt
        color: "#333333"
      mailing_area:
        position: "right half of back"
        indicia_box: "top-right, 1in × 0.75in reserved for postage indicia"
        address_lines: "center of right half, 5 lines, 12pt font"
        usps_barcode: "bottom of right half, reserved zone"
      message_body:
        position: "left half of back, below return address"
        font: Helvetica
        size: 10pt
        color: "#222222"
        max_words: 100
      company_logo:
        position: "top-center of message body zone"
        size: "auto-fit, max height 30pt"
        nullable: true

  postcard_6x9:
    label: "Postcard 6×9"
    description: >
      Oversized postcard with significantly more visual real estate. Higher impact
      than 4×6, higher cost. Ideal for B2B campaigns with more copy requirements
      or premium brand positioning.
    dimensions:
      total_with_bleed:
        width_inches: 6.25
        height_inches: 9.25
        width_points: 450.0
        height_points: 666.0
      safe_area:
        width_inches: 6.0
        height_inches: 9.0
        width_points: 432.0
        height_points: 648.0
      bleed_per_side_inches: 0.125
      bleed_per_side_points: 9.0
    dpi: 300
    sides: [front, back]
    front_layout:
      hero_visual_area:
        position: "top 55% of front canvas"
        treatment: "brand primary_color fill or brand image area"
      headline:
        position: "hero area, vertically centered"
        font: Helvetica-Bold
        size: 34pt
        color: "#FFFFFF"
        max_chars: 70
      sub_headline:
        position: "below headline in hero"
        font: Helvetica
        size: 16pt
        color: "#EEEEEE"
        max_chars: 100
        nullable: true
      cta:
        position: "bottom section of front, outside hero area"
        font: Helvetica-Bold
        size: 18pt
        color: brand.primary_color
        max_chars: 50
      qr_placeholder:
        position: "bottom-right of front"
        size: "1.0in × 1.0in (72 × 72 pts)"
        content: "Empty white box with border; label 'Scan Me' in 10pt"
      company_name:
        position: "bottom-left of front"
        font: Helvetica
        size: 11pt
        color: "#FFFFFF"
    back_layout:
      return_address:
        position: "top-left quadrant"
        content: "content_props.return_address"
        font: Helvetica
        size: 10pt
        color: "#333333"
      mailing_area:
        position: "right half of back"
        indicia_box: "top-right, 1.25in × 0.875in reserved"
        address_lines: "center of right half, 5 lines, 13pt font"
        usps_barcode: "bottom of right half, reserved zone"
      message_body:
        position: "left half of back, below return address"
        font: Helvetica
        size: 11pt
        color: "#222222"
        max_words: 120
      company_logo:
        position: "top-left of back panel, above return address"
        size: "auto-fit, max height 36pt"
        nullable: true

  letter_8_5x11:
    label: "Letter 8.5×11"
    description: >
      Full-page direct mail letter. Standard US letter size with professional
      margins. Higher copy density than postcards. Suitable for complex value
      propositions, formal B2B outreach, or personalized executive prospecting.
      Single side (front only). No bleed required.
    dimensions:
      width_inches: 8.5
      height_inches: 11.0
      width_points: 612.0
      height_points: 792.0
      bleed: none
    dpi: 300
    sides: [front]
    margins:
      top_inches: 1.0
      bottom_inches: 1.0
      left_inches: 1.25
      right_inches: 1.25
      top_points: 72.0
      bottom_points: 72.0
      left_points: 90.0
      right_points: 90.0
    front_layout:
      letterhead:
        position: "top of page within margins"
        company_name:
          font: Helvetica-Bold
          size: 16pt
          color: brand.primary_color
        company_tagline:
          font: Helvetica
          size: 10pt
          color: "#666666"
          nullable: true
        separator_line:
          width: "full text width"
          color: brand.primary_color
          height: 1.5pt
      date_and_address:
        position: "below letterhead, left-aligned"
        date_format: "March 26, 2026"
        font: Helvetica
        size: 11pt
        color: "#333333"
      salutation:
        font: Helvetica
        size: 11pt
        color: "#222222"
        format: "Dear {recipient_first_name}, OR Dear Business Owner,"
      body:
        font: Helvetica
        size: 11pt
        color: "#222222"
        leading: 16pt
        paragraphs: "3–5 paragraphs; 250–400 words total"
        word_range: [250, 400]
      cta_block:
        position: "final paragraph, visually distinct"
        treatment: "Left-border accent bar (brand.primary_color, 3pt) with indented CTA text"
        font: Helvetica-Bold
        size: 12pt
        color: brand.primary_color
      closing:
        format: "Sincerely,\n\n{company_name}\n{optional_signatory_name}"
        font: Helvetica
        size: 11pt
      footer:
        position: "bottom of page within margins"
        content: "company address or website, fine print if required"
        font: Helvetica
        size: 8pt
        color: "#888888"

# ─────────────────────────────────────────────────────────────────────────────
# PIPELINE
# ─────────────────────────────────────────────────────────────────────────────
pipeline:
  generator: ClaudeAIClient
  renderer: ReportLab >= 4.1 (programmatic, no template files)
  provider: Anthropic
  claude_model: claude-sonnet-4-20250514
  claude_temperature: 0.4
  structured_output_pattern: tool_use
  prompt_caching: true
  max_output_tokens: 64000  # Sonnet ceiling

  generation_flow:
    - Build AssetContext via build_asset_context(org_id, campaign_id, supabase)
    - Determine subtype from content_props.subtype
    - Call Claude to generate or refine copy fields (headline, body_copy, cta_text)
      if any are not provided in content_props
    - Validate copy lengths against subtype hard limits
    - Pass validated copy + brand context to ReportLab renderer
    - Renderer produces multi-page PDF (page 1 = front, page 2 = back for postcards;
      single page for letter)
    - Upload PDF binary to Supabase Storage
    - Insert record into generated_assets table
    - Return asset_id, content_url (NO Lob API call)

  claude_output_structure:
    type: object
    properties:
      headline: string
      sub_headline: string  # nullable, 6x9 only
      body_copy: string
      cta_text: string
      salutation: string  # letter only

# ─────────────────────────────────────────────────────────────────────────────
# RENDERER SPECIFICATION
# ─────────────────────────────────────────────────────────────────────────────
renderer:
  engine: ReportLab

  general_settings:
    dpi: 300
    color_space: RGB  # convert to CMYK at print vendor if required
    font_embedding: true
    bleed_included: true  # for postcard subtypes

  color_rendering:
    background_fills: "Use brand.primary_color or brand.secondary_color as solid fills"
    text_on_dark: "#FFFFFF or #EEEEEE"
    text_on_light: "#222222 or #333333"
    accent_elements: brand.primary_color

  postcard_rendering:
    page_count: 2  # page 1 = front, page 2 = back
    bleed_rendering: >
      Background fills extend to total_with_bleed dimensions.
      All text and logos positioned within safe_area coordinates.
    crop_marks: optional  # can be added as thin hairlines outside bleed
    qr_placeholder: "Empty 1pt-border rectangle with 'Scan Me' label in 9–10pt Helvetica"

  letter_rendering:
    page_count: 1
    bleed_rendering: "No bleed; all content within standard margins"
    letterhead_separator: "1.5pt horizontal rule in brand.primary_color below letterhead block"
    cta_accent: "3pt left-border bar in brand.primary_color, 12pt indent on CTA paragraph"

  typography_summary:
    postcard_4x6_headline: "Helvetica-Bold, 28pt, white"
    postcard_6x9_headline: "Helvetica-Bold, 34pt, white"
    postcard_body: "Helvetica, 10–11pt, #222"
    postcard_cta: "Helvetica-Bold, 16–18pt, primary_color or white"
    letter_body: "Helvetica, 11pt, #222"
    letter_cta: "Helvetica-Bold, 12pt, primary_color"
    letter_letterhead: "Helvetica-Bold, 16pt, primary_color"

# ─────────────────────────────────────────────────────────────────────────────
# BRAND CONTEXT INTEGRATION
# ─────────────────────────────────────────────────────────────────────────────
brand_context:
  source: build_asset_context(org_id, campaign_id, supabase)
  model: AssetContext
  fields_used:
    - company_name → front company label, letter letterhead, return address fallback
    - brand_guidelines.primary_color → hero fill, accent bars, CTA text, letterhead rule
    - brand_guidelines.secondary_color → contrast CTA backgrounds, accent elements
    - brand_voice → Claude prompt tone instruction (concise, direct, professional)
    - value_proposition → headline framing and body copy opening hook
    - icp_definition → audience targeting for copy personalization
    - customer_logos → not used in physical mail (size constraints)
    - angle → campaign angle for copy direction

# ─────────────────────────────────────────────────────────────────────────────
# DELIVERY
# ─────────────────────────────────────────────────────────────────────────────
delivery:
  mode: sync
  output_format: pdf_binary
  storage: supabase
  bucket: assets
  path_pattern: "physical_mail/{organization_id}/{asset_id}.pdf"
  auth: service_role_key via httpx REST upload
  public_url: true
  fulfillment: NONE  # This generator does NOT submit to Lob or any print vendor

# ─────────────────────────────────────────────────────────────────────────────
# CONTENT PROPS SCHEMA
# ─────────────────────────────────────────────────────────────────────────────
content_props_schema:
  type: object
  properties:
    subtype:
      type: string
      enum: [postcard_4x6, postcard_6x9, letter_8_5x11]
      description: "Format selector — drives canvas size, bleed, layout, and copy length."
    headline:
      type: string
      description: >
        Primary headline for front (postcards) or opening subject-line equivalent (letter).
        If omitted, Claude generates it from topic and value_proposition.
      nullable: true
    body_copy:
      type: string
      description: >
        Message body text. For postcards: ≤100 words. For letter: 250–400 words.
        If omitted, Claude generates from the brand context and campaign objective.
      nullable: true
    cta_text:
      type: string
      description: >
        Call-to-action text appearing on front (postcards) or in the CTA block (letter).
        E.g. 'Get your free audit at acme.com/free' or 'Call 1-800-555-0199 today'.
        If omitted, Claude generates from objective.
      nullable: true
    return_address:
      type: object
      description: "Sender's return address. Required for postcard subtypes."
      properties:
        name:
          type: string
          description: "Company name or sender name."
        street:
          type: string
        city:
          type: string
        state:
          type: string
          description: "2-letter US state code."
        zip:
          type: string
      required: [name, street, city, state, zip]
      nullable: true  # Optional for letter_8_5x11; required for postcards
    recipient_info:
      type: object
      description: >
        Optional. If provided, used to personalize headline and body copy with
        recipient name/company. For letter salutation personalization.
      properties:
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
      nullable: true
  required: [subtype]

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUT SCHEMA
# ─────────────────────────────────────────────────────────────────────────────
output_schema:
  type: object
  properties:
    asset_id:
      type: string
      format: uuid
    content_url:
      type: string
      format: uri
      description: "Public Supabase Storage URL for the print-ready PDF binary."
    organization_id:
      type: string
      format: uuid
    campaign_id:
      type: string
      format: uuid
      nullable: true
    asset_type:
      type: string
      const: physical_mail
    template_used:
      type: string
      description: "Subtype used (postcard_4x6 | postcard_6x9 | letter_8_5x11)."
    page_count:
      type: integer
      description: "Number of pages in PDF (2 for postcards, 1 for letter)."
    dimensions_points:
      type: object
      description: "Actual canvas dimensions used (with bleed for postcards)."
      properties:
        width: number
        height: number
    created_at:
      type: string
      format: date-time
    status:
      type: string
      enum: [complete, failed]
    fulfillment_status:
      type: string
      const: "not_submitted"
      description: "Always 'not_submitted' — Lob API is NOT called by this generator."

# ─────────────────────────────────────────────────────────────────────────────
# EXAMPLE REQUEST / RESPONSE
# ─────────────────────────────────────────────────────────────────────────────
example_request:
  organization_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
