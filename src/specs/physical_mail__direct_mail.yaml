  content_url: "https://xyzproject.supabase.co/storage/v1/object/public/assets/physical_mail/a1b2c3d4/e56fg789.pdf"
  organization_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
  campaign_id: "c9d8e7f6-a5b4-3210-fedc-ba0987654321"
  asset_type: physical_mail
  template_used: postcard_6x9
  page_count: 2
  dimensions_points:
    width: 450.0
    height: 666.0
  created_at: "2026-03-26T16:02:00Z"
