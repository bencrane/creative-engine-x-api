  fulfillment_status: "not_submitted"

# ─────────────────────────────────────────────────────────────────────────────
# QUALITY BAR
# ─────────────────────────────────────────────────────────────────────────────
quality_bar:
  print_readiness: "PDF must be 300 DPI; all elements within safe area; bleed fills extend to full canvas."
  copy_length: "Postcard body ≤100 words enforced; letter body 250–400 words enforced."
  brand_application: "Hero area uses primary_color or secondary_color; CTA uses primary_color accent."
  no_lob_call: "Zero calls to Lob API or any external mail/print service — strictly enforced."
  safe_area_compliance: "No text, logo, or critical graphic element within bleed zone."
  bleed_fill: "Background fills must extend to bleed edge with no white gaps."
  return_address: "Required for postcards; must be legible at 9–10pt in the designated zone."
  pdf_integrity: "Valid PDF, fonts embedded, opens without error in standard PDF reader."

acceptance_criteria:
  - "PDF is valid and opens in standard PDF readers without errors."
  - "Canvas dimensions match subtype specification (including bleed) within 0.5pt tolerance."
  - "All text and logos are within the safe area (not within the bleed zone)."
  - "Background fills extend to the bleed edge with no white or unfilled gaps."
  - "Postcard PDFs have exactly 2 pages (front + back); letter has exactly 1 page."
  - "Front page includes: hero area, headline, CTA, QR placeholder, company name."
  - "Back page (postcards) includes: return address zone, mailing area, indicia box, message body."
  - "Letter includes: letterhead, date, salutation, body paragraphs, CTA block, closing, footer."
  - "Body copy word count is within subtype limits (≤100 for postcards, 250–400 for letter)."
  - "Claude model used is claude-sonnet-4-20250514 — verified in generation logs."
  - "No Lob API call is made at any point during generation — verified in request logs."
  - "PDF stored in Supabase Storage at expected path; public URL is resolvable."
  - "generated_assets row inserted with asset_type=physical_mail, correct subtype in template_used."
  - "fulfillment_status returned as 'not_submitted' in all responses."
